name: blueprint-ci

on:
  push:
    paths:
      - "blueprint/**"
  pull_request:
    paths:
      - "blueprint/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: blueprint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: blueprint/go.mod

      - name: build
        run: make build

      - name: vet
        run: make vet

      - name: test
        run: make test

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: blueprint
