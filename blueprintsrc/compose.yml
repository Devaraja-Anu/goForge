services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blueprint
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/blueprint?sslmode=disable
      PORT: "8080"
      APP_ENV: development
      FRONTEND_URL: http://localhost:3000
      TRUST_PROXY_HEADERS: "false"
      DB_MAX_CONNS: "25"
      DB_MIN_CONNS: "5"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: